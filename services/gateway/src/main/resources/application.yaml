spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        # Core Service Routes
        - id: core-service-auth
          uri: lb://core-service
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - AuthFilter

        - id: core-service-users
          uri: lb://core-service
          predicates:
            - Path=/api/v1/users/**
          filters:
            - AuthFilter

        - id: core-service-courses
          uri: lb://core-service
          predicates:
            - Path=/api/v1/courses/**
          filters:
            - AuthFilter

        - id: core-service-media
          uri: lb://core-service
          predicates:
            - Path=/media/**

        - id: core-service-enrollments
          uri: lb://core-service
          predicates:
            - Path=/api/v1/enrollments/**
          filters:
            - AuthFilter

        - id: core-service-live
          uri: lb://core-service
          predicates:
            - Path=/api/v1/live/**
          filters:
            - AuthFilter

        - id: core-service-payments
          uri: lb://core-service
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - AuthFilter

        - id: core-service-admin
          uri: lb://core-service
          predicates:
            - Path=/api/v1/admin/**
          filters:
            - AuthFilter

        # Chat Service Routes
        - id: chat-service
          uri: lb://chat-service
          predicates:
            - Path=/live/**
          filters:
            - AuthFilter

        # AI Service Routes
        - id: ai-service
          uri: lb://ai-service
          predicates:
            - Path=/api/v1/ai/**
          filters:
            - AuthFilter

      # CORS configuration
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns:
              - "http://localhost:*"
              - "http://127.0.0.1:*"
              - "https://*.eduplatform.com"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 3600

      # HTTP/2 support
      httpClient:
        connect-timeout: 10000
        response-timeout: 60000

    # Service Discovery via Consul
    consul:
      host: ${CONSUL_HOST:localhost}
      port: ${CONSUL_PORT:8500}
      discovery:
        service-name: gateway-service
        instance-id: gateway-1
        prefer-ip-address: true
        healthCheckPath: /actuator/health
        healthCheckInterval: 10s
        tags:
          - service:gateway
          - version:1.0

  # Server configuration
  server:
    port: ${GATEWAY_PORT:8080}
    shutdown: graceful

# Actuator for health checks
management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - metrics
  endpoint:
    health:
      show-details: always
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

# JWT Configuration
security:
  jwt:
    secret: ${JWT_SECRET:your-super-secret-key-change-in-production-min-32-chars}
    expiry: ${JWT_EXPIRY_MINUTES:30}

# Logging
logging:
  level:
    root: INFO
    com.eduplatform: DEBUG
    org.springframework.cloud.gateway: DEBUG
    io.jsonwebtoken: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

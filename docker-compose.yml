version: '3.8'

services:
  # ==================== SERVICE DISCOVERY ====================
  platform-consul:
    image: hashicorp/consul:1.22
    container_name: platform-consul
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    environment:
      CONSUL_BIND_INTERFACE: eth0
    command: agent -server -bootstrap-expect=1 -ui -client=0.0.0.0
    volumes:
      - consul_data:/consul/data
    networks:
      - eduplatform-network
    healthcheck:
      test: consul members
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== VECTOR DATABASE ====================
  platform-chromadb:
    image: chromadb/chroma:latest
    container_name: platform-chromadb
    ports:
      - "8003:8000"
    environment:
      CHROMA_DB_IMPL: duckdb
      PERSIST_DIRECTORY: /chroma/data
    volumes:
      - chromadb_data:/chroma/data
    networks:
      - eduplatform-network
    healthcheck:
      test: curl -f http://localhost:8000/api/v1/heartbeat || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  consul_data:
    driver: local
  chromadb_data:
    driver: local

networks:
  eduplatform-network:
    driver: bridge